{% extends "fitness/base.html" %}
{% block title %}{% if habit %}Edit{% else %}Add{% endif %} Habit — LISA{% endblock %}

{% block content %}
<a href="{% url 'fitness:habits_list' %}" style="font-size:.85rem;color:var(--text-muted)">← Habits</a>
<h1 class="mt-1">{% if habit %}Edit "{{ habit.name }}"{% else %}Add Habit{% endif %}</h1>

{% if error %}
<div style="background:var(--red-soft);color:var(--red);padding:.75rem 1rem;border-radius:var(--radius-sm);margin-bottom:1rem;font-size:.85rem">{{ error }}</div>
{% endif %}

<form method="post" class="form-grid" style="max-width:500px;">
  {% csrf_token %}
  <div class="form-group form-full">
    <label for="name">Habit Name</label>
    <input type="text" id="name" name="name" value="{{ habit.name|default:'' }}" placeholder="e.g. Drink 8 glasses of water" required>
  </div>
  <div class="form-group form-full">
    <label for="description">Description</label>
    <input type="text" id="description" name="description" value="{{ habit.description|default:'' }}" placeholder="Optional">
  </div>
  <div class="form-group form-full flex gap-sm" style="margin-top:1rem;">
    <button type="submit" class="btn btn-primary">{% if habit %}Save{% else %}Add Habit{% endif %}</button>
    <a href="{% url 'fitness:habits_list' %}" class="btn btn-ghost">Cancel</a>
  </div>
</form>
{% endblock %}
