# Render Blueprint – uses Supabase REST API (no direct Postgres connection needed)

services:
  - type: web
    name: healthassistent
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: gunicorn config.wsgi:application
    preDeployCommand: python manage.py migrate --no-input

    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_API_KEY
        sync: false
      - key: GARMIN_EMAIL
        sync: false
      - key: GARMIN_PASSWORD
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: MISTRAL_AI_API_KEY
        sync: false
